name: 📖 InkOS Novel Writer

on:
  workflow_dispatch:
    inputs:
      book_title:
        description: '书名'
        required: true
        default: '我重生后靠签到系统无敌了'
      genre:
        description: '题材 (xuanhuan/xianxia/urban/scifi/system)'
        required: true
        default: 'xuanhuan'
      action:
        description: '动作'
        required: true
        default: 'create-and-write'
        type: choice
        options:
          - create-and-write
          - write-next
          - create-book
          - export
          - status
      chapters:
        description: '写几章 (仅 write-next/create-and-write 时生效)'
        required: false
        default: '1'

env:
  INKOS_LLM_PROVIDER: custom
  INKOS_LLM_BASE_URL: https://open.bigmodel.cn/api/paas/v4
  INKOS_LLM_MODEL: glm-4-flash

jobs:
  novel-writer:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install InkOS
        run: npm i -g @actalk/inkos

      - name: Configure InkOS
        run: |
          inkos config set-global \
            --provider custom \
            --base-url "https://open.bigmodel.cn/api/paas/v4" \
            --api-key "${{ secrets.INKOS_API_KEY }}" \
            --model glm-4-flash

      - name: Create Book + Write
        if: github.event.inputs.action == 'create-and-write'
        run: |
          inkos init my-novel
          cd my-novel
          inkos book create \
            --title "${{ github.event.inputs.book_title }}" \
            --genre "${{ github.event.inputs.genre }}" \
            --brief ../brief.md
          COUNT=${{ github.event.inputs.chapters }}
          for i in $(seq 1 $COUNT); do
            echo "===== 写第 $i 章 ====="
            inkos write next "${{ github.event.inputs.book_title }}" || echo "⚠️ 第 $i 章失败，继续"
          done

      - name: Create Book Only
        if: github.event.inputs.action == 'create-book'
        run: |
          inkos init my-novel
          cd my-novel
          inkos book create \
            --title "${{ github.event.inputs.book_title }}" \
            --genre "${{ github.event.inputs.genre }}" \
            --brief ../brief.md

      - name: Write Chapters
        if: github.event.inputs.action == 'write-next'
        run: |
          cd my-novel
          COUNT=${{ github.event.inputs.chapters }}
          for i in $(seq 1 $COUNT); do
            echo "===== 写第 $i 章 ====="
            inkos write next "${{ github.event.inputs.book_title }}" || echo "⚠️ 第 $i 章失败，继续"
          done

      - name: Export Book
        if: github.event.inputs.action == 'export'
        run: |
          cd my-novel
          inkos export "${{ github.event.inputs.book_title }}" --format epub
          inkos export "${{ github.event.inputs.book_title }}" --format txt

      - name: Show Status
        if: github.event.inputs.action == 'status'
        run: |
          cd my-novel
          inkos status

      - name: Commit Results
        if: always()
        run: |
          git config user.name "InkOS Bot"
          git config user.email "bot@inkos.dev"
          git add -A || true
          git diff --staged --quiet || git commit -m "📖 ${{ github.event.inputs.action }}: ${{ github.event.inputs.book_title }}"
          git push || true
