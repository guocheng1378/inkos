name: 📖 InkOS Novel Writer

on:
  workflow_dispatch:
    inputs:
      book_title:
        description: '书名'
        required: true
        default: '我重生后靠签到系统无敌了'
      genre:
        description: '题材 (xuanhuan/xianxia/urban/scifi/system)'
        required: true
        default: 'xuanhuan'
      action:
        description: '动作'
        required: true
        default: 'write-next'
        type: choice
        options:
          - write-next
          - create-book
          - export
          - status
      chapters:
        description: '写几章 (仅 write-next 时生效)'
        required: false
        default: '1'

env:
  INKOS_LLM_PROVIDER: custom
  INKOS_LLM_BASE_URL: https://open.bigmodel.cn/api/paas/v4
  INKOS_LLM_MODEL: glm-4-flash

jobs:
  novel-writer:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install InkOS
        run: npm i -g @actalk/inkos

      - name: Configure InkOS
        run: |
          inkos config set-global \
            --provider custom \
            --base-url "https://open.bigmodel.cn/api/paas/v4" \
            --api-key "${{ secrets.INKOS_API_KEY }}" \
            --model glm-4-flash

      - name: Create Book
        if: github.event.inputs.action == 'create-book'
        run: |
          inkos init my-novel
          cd my-novel
          inkos book create \
            --title "${{ github.event.inputs.book_title }}" \
            --genre "${{ github.event.inputs.genre }}" \
            --brief ../brief.md

      - name: Write Chapters
        if: github.event.inputs.action == 'write-next'
        run: |
          cd my-novel || true
          COUNT=${{ github.event.inputs.chapters }}
          for i in $(seq 1 $COUNT); do
            echo "===== 写第 $i 章 ====="
            inkos write next "${{ github.event.inputs.book_title }}" || true
          done

      - name: Export Book
        if: github.event.inputs.action == 'export'
        run: |
          cd my-novel
          inkos export "${{ github.event.inputs.book_title }}" --format epub
          inkos export "${{ github.event.inputs.book_title }}" --format txt

      - name: Show Status
        if: github.event.inputs.action == 'status'
        run: |
          cd my-novel || true
          inkos status

      - name: Notify via Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            STATUS="${{ job.status }}"
            TITLE="${{ github.event.inputs.book_title }}"
            ACTION="${{ github.event.inputs.action }}"
            LINK="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            if [ "$STATUS" = "success" ]; then
              MSG="✅ 写作完成！%0A📚 ${TITLE}%0A🎯 ${ACTION}%0A🔗 ${LINK}"
            else
              MSG="❌ 写作失败！%0A📚 ${TITLE}%0A🔗 ${LINK}"
            fi
            curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT}&text=${MSG}&parse_mode=HTML"
          fi

      - name: Commit Results
        run: |
          git config user.name "InkOS Bot"
          git config user.email "bot@inkos.dev"
          git add -A || true
          git diff --staged --quiet || git commit -m "📖 ${{ github.event.inputs.action }}: ${{ github.event.inputs.book_title }}"
          git push || true
